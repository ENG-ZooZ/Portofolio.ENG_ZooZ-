<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@300;600;900&display=swap"
    rel="stylesheet">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#050505">
  <title>ËŇĞ • ŽööŽ</title>

  <style>
    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden !important;
      background-color: #050505;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      position: relative;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #root {
      width: 100%;
      min-height: 100vh;
      display: block;
      overflow-x: hidden;
    }

    img,
    video {
      max-width: 100%;
      height: auto;
      display: inline-block;
      vertical-align: middle;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding-left: clamp(15px, 5vw, 30px);
      padding-right: clamp(15px, 5vw, 30px);
    }

    .flex-responsive {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .flex-responsive {
        flex-direction: column;
      }

      h1,
      h2,
      h3 {
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
    }

    .row {
      margin-left: 0 !important;
      margin-right: 0 !important;
      display: flex;
      flex-wrap: wrap;
    }

    .row>* {
      padding-left: 0 !important;
      padding-right: 0 !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
